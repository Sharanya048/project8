<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
#main{
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 20px;
    max-width: 1280px;
    margin: auto;
    align-content: space-between;

}
#cart{
    text-align: right;
    margin-top: 0;
}
.card{
    box-sizing: border-box;
    box-shadow: 5px 8px 10px ;
    align-items: center;
    text-align: center;

}
.nav>ul{
    justify-content: end;
    display: flex;
    gap: 20px;
    margin-top: 0;
    list-style: none;
    color: white;
    text-align: right;
    
}
header {
  background-color: #752999;
  color: white;
  padding: 1px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}a{
    text-decoration: none;
    font-size: 20px;
    color: white;
}
    </style>
</head>
<body>
     <header>
    <h1>Simple Shop</h1>
     <nav class="nav">
                <ul>
                    <li><a href=>Home</a></li>
                    <li><a href=>About</a></li>
                    <li><a href=>Products</a></li>
                    <li><a href=>Cart🛒</a></li>
                </ul>
            </nav>
  </header>

    <div id="main"></div>
    <script src="./project.js"></script>
</body>
</html>
