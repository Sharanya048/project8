<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Shop</title>
  <link rel="stylesheet" href="just.css" />
</head>
<body>
  <header>
    <h1>Simple Shop</h1>
    <div id="cart">🛒 Cart (<span id="cart-count">0</span>)</div>
  </header>

  <main>
    <div class="product-list">
      <div class="product">
        <img src="https://picsum.photos/200/150?random=1" alt="Product 1">
        <h3>Product 1</h3>
        <p>This is a nice product.</p>
        <p><strong>$10</strong></p>
        <button>Add to Cart</button>
      </div>

      <div class="product">
        <img src="https://picsum.photos/200/150?random=2" alt="Product 2">
        <h3>Product 2</h3>
        <p>Another great product.</p>
        <p><strong>$15</strong></p>
        <button>Add to Cart</button>
      </div>

      <div class="product">
        <img src="https://picsum.photos/200/150?random=3" alt="Product 3">
        <h3>Product 3</h3>
        <p>You’ll love this one.</p>
        <p><strong>$20</strong></p>
        <button>Add to Cart</button>
      </div>
    </div>
  </main>

  <script src="just.js"></script>
</body>
</html>
